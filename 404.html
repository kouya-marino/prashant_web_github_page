<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Page Not Found | Prashant Rawat</title>
  <link rel="icon" type="image/png" href="/assets/images/logo_2.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --accent: #06b6d4;
      --bg: #f1f5f9;
      --text: #334155;
      --heading: #0f172a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 520px; }
    .code {
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h1 { color: var(--heading); font-size: 1.6rem; margin: 0.5rem 0 0.75rem; }
    p { color: #64748b; margin-bottom: 1.75rem; line-height: 1.6; }
    .actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    a.btn {
      display: inline-block;
      padding: 0.7rem 1.4rem;
      border-radius: 8px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    a.btn-primary { background: var(--primary); color: #fff; }
    a.btn-primary:hover { background: #1d4ed8; }
    a.btn-ghost { border: 1px solid #cbd5e1; color: var(--text); }
    a.btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have moved. Let's get you back on track.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Back to home</a>
      <a class="btn btn-ghost" href="/blog.html">Read the blog</a>
    </div>
  </main>
</body>
</html>
